<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BlueteamingAsia{% endblock %} | AI Cyber-Physical Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e3a5f',
                            900: '#0f172a',
                        },
                        severity: {
                            info: '#6b7280',
                            low: '#3b82f6',
                            medium: '#f59e0b',
                            high: '#ef4444',
                            critical: '#dc2626',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="h-full {% block body_class %}bg-gray-50{% endblock %}">
    {% include 'components/_navbar.html' %}
    {% include 'components/_flash_messages.html' %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% include 'components/_footer.html' %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
