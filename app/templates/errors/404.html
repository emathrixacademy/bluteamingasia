{% extends 'base.html' %}
{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="text-center">
        <p class="text-6xl font-bold text-blue-600">404</p>
        <h1 class="mt-4 text-3xl font-bold text-gray-900">Page not found</h1>
        <p class="mt-2 text-gray-600">The page you're looking for doesn't exist or has been moved.</p>
        <div class="mt-6">
            <a href="{{ url_for('main.landing') }}" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md text-sm font-medium">Go Home</a>
        </div>
    </div>
</div>
{% endblock %}
